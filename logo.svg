<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#70a5fd" />
      <stop offset="100%" stop-color="#d500f9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
    .animated-element {
      animation: float 4s ease-in-out infinite;
      transform-origin: center;
    }
    .glowing-circle {
      animation: pulse 3s ease-in-out infinite;
    }
  </style>

  <g class="animated-element">
    <!-- Dark Background Circle for visibility in both themes -->
    <circle cx="100" cy="100" r="73" fill="#0f172a" />
    
    <!-- Glowing Outer Circle -->
    <circle cx="100" cy="100" r="75" stroke="url(#circleGrad)" stroke-width="4" filter="url(#glow)" class="glowing-circle" />
    
    <!-- Inner design - CT letters -->
    <text x="100" y="114" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">CT</text>
  </g>
</svg>
